    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

        <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
        <link href="https://fonts.googleapis.com/css?family=Catamaran:100,200,300,400,500,600,700,800,900" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css?family=Lato:100,100i,300,300i,400,400i,700,700i,900,900i" rel="stylesheet" />

        <link href="styles.css" rel="stylesheet" />

        <style> header.masthead {background: linear-gradient(0deg, #d461b3 0%, #ffd12d 100%);} </style>

    </head>

<body id="page-top">
        <!-- Navigation-->
        <nav class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top">
            <div class="container px-5">
                <a class="navbar-brand" href="#page-top">space.com</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
                <div class="collapse navbar-collapse" id="navbarResponsive">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="APOD.html">APOD</a></li>
                        <li class="nav-item"><a class="nav-link" href="EPIC.html">EPIC</a></li>
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- Header-->
        <header class="masthead text-center text-white">
            <div class="masthead-content">
                <div class="container px-5">
                    <h1 class="masthead-heading mb-0">EONET: Earth Observatory Natural Event Tracker</h1>
                </div>
            </div>
        </header>

    <div id="output"></div>

    <script>
        function getEventData() {
           fetch('https://eonet.gsfc.nasa.gov/api/v2.1/events')
                  .then((response) => response.json())
                .then((json) => {
                    console.log(json)
                    eventIndex = Math.floor(Math.random() * 15);
                    event2Index=Math.floor(Math.random() * 15);
                    event3Index=Math.floor(Math.random() * 15);
                    const event1=json.events[eventIndex];
                    const event2=json.events[event2Index];
                    const event3=json.events[event3Index];
                    const source1Url = event1.sources[0].url;
                    const source2Url = event2.sources[0].url;
                    const source3Url = event3.sources[0].url;
                    
                    

                    document.getElementById("output").innerHTML = `
                        <div class="card p-3">
                            <p>Event: ${event1.title}</p>
                            <p>
                            Learn More: <a href="${source1Url}" target="_blank">
                                Click Here
                            </a>
                        </p>

                        </div>
                        <div class="card p-3">
                            <p>Event: ${event2.title}</p>
                            <p>
                            Learn More: <a href="${source2Url}" target="_blank">
                                Click Here
                            </a>
                        </p>
                            
                        </div>
                        <div class="card p-3">
                            <p>Event: ${event3.title}</p>
                            <p>
                            Learn More: <a href="${source3Url}" target="_blank">
                                Click Here
                            </a>
                        </p>
                        </div>
                    `;
                })
                .catch((error) => {
                    console.error(error);
                });
                
                
        }



                   

    getEventData();
    </script>
</body>
</html>
