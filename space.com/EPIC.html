<body id="page-top">
        <!-- Navigation-->
        <nav class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top">
            <div class="container px-5">
                <a class="navbar-brand" href="#page-top">space.com</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
                <div class="collapse navbar-collapse" id="navbarResponsive">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="APOD.html">APOD</a></li>
                        <li class="nav-item"><a class="nav-link" href="Insight.html">EONET</a></li>
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- Header-->
        <header class="masthead text-center text-white">
            <div class="masthead-content">
                <div class="container px-5">
                    <h1 class="masthead-heading mb-0">EPIC: Earth Polytechnic Imaging Camera</h1>
                </div>
            </div>
        </header>

    <div id="output"></div>

    <script>
        function getData() {
            fetch('https://api.nasa.gov/EPIC/api/natural/date/2019-05-30?api_key=xTbGBXasS7UIDyrcua4If6o4HSKm2jgXzcagpz0H')
                .then((response) => response.json())
                .then((json) => {
                    console.log(json);

                    const first = json[0];

                    //converting the date to YYYY/MM/DD format
                    const date = first.date.split(" ")[0].replace(/-/g, "/");

                    
                    const imageUrl = "https://epic.gsfc.nasa.gov/archive/natural/" + date + "/png/" + first.image + ".png";

                    document.getElementById("output").innerHTML = `
                        <div class="card p-3">
                            <p>Caption: ${first.caption}</p>
                            <p>Date: ${first.date}</p>
                            <img src="${imageUrl}" class="img-fluid mt-2">
                        </div>
                    `;
                })
                .catch((error) => {
                    console.error(error);
                });
        }

        getData();
    </script>
</body>
</html>
