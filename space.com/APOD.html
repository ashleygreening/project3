<!DOCTYPE html>
<html>
    <head>
        <title>APOD</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css">
    </head>

<body class="container mt-4">
    <h1>APOD: Astronomy Picture of the Day</h1>
    <div id="output"></div>
    <script>
        function getData() {
    fetch('https://api.nasa.gov/planetary/apod?api_key=xTbGBXasS7UIDyrcua4If6o4HSKm2jgXzcagpz0H')
        .then((response) => response.json())
        .then((data) => {
            console.log(data);
            const date = data.date;

            const imageUrl = data.hdurl;

            document.getElementById("output").innerHTML = `
                <div class="card p-3">
                    <h3>${data.title}</h3>
                    <p>Date: ${data.date}</p>
                    <p>${data.explanation}</p>
                    <img src="${imageUrl}" class="img-fluid mt-2"}>
                </div>
            `;
        })
        .catch((error) => {
            console.error("Error fetching APOD data:", error);
        });
        }


        getData();
    </script>

    </body>
</html>
